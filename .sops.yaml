# sops-nix recipients.
# Replace the placeholder public keys below with the ones you generate
# (see the setup steps), then run `sops updatekeys` on any existing secret.
keys:
  # Your personal/admin key (~/.config/sops/age/keys.txt) — lets you edit secrets.
  - &admin age1wvwe80jl34d5zpx43rtskkmv4zzpakyve7gxe7wv4m7czhp5tf7skmhre0
  # The work host's key (/var/lib/sops-nix/key.txt) — lets the host decrypt at boot.
  - &work age1rvqqy5rurwlxxk6devnl9hus6dl0uq8vtk64h2a6temtmamnj5lsayhnhu
creation_rules:
  - path_regex: modules/security/secrets/[^/]+\.yaml$
    key_groups:
      - age:
          - *admin
          - *work
# This example uses YAML anchors which allows reuse of multiple keys
# without having to repeat yourself.
# Also see https://github.com/Mic92/dotfiles/blob/d6114726d859df36ccaa32891c4963ae5717ef7f/nixos/.sops.yaml
# for a more complex example.
keys:
  - &k3s age1reajw226mczy7vacrncvjflfs3zh5kexczvqz559k4l2rp7pgqnqu9dwfr
creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
    - age:
      - *k3s
